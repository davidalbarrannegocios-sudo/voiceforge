<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elite Labs — Mantenimiento</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }
    .logo {
      font-size: 1.75rem;
      letter-spacing: -0.02em;
      color: #fff;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .message {
      text-align: center;
      line-height: 1.6;
    }
    .message p:first-child {
      font-size: 1.125rem;
      font-weight: 500;
      color: #ffffff;
    }
    .message p:last-child {
      font-size: 0.9rem;
      color: #ffffff;
      margin-top: 0.4rem;
    }
  </style>
</head>
<body>
  <div class="logo"><span style="font-weight:300">Elite</span><span style="font-weight:700">Labs</span></div>
  <div class="spinner"></div>
  <div class="message">
    <p>Estamos mejorando Elite Labs.</p>
    <p>Volvemos en unos minutos.</p>
  </div>
</body>
</html>
